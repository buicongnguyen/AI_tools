name: Site or example bug
description: Report a reproducible defect in the site, lab, or workflow.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the page or lab, commands, browser/OS, and smallest reproducible steps.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste safe logs or screenshots. Remove secrets and private data.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I removed credentials, tokens, customer data, and private code.
          required: true
