name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify required files and HTML structure
        shell: pwsh
        run: |
          $required = @(
            "index.html",
            "loop-engineering.html",
            "README.md",
            "AI_AGENT_PLAYBOOK.md",
            "SOURCES.md",
            "templates/LOOP_SPEC.md",
            "templates/loop-config.example.yml",
            "templates/loop-state.example.json",
            "templates/MAKER_PROMPT.md",
            "templates/VERIFIER_PROMPT.md",
            "test-set/loop-engineering-evals.csv"
          )
          foreach ($file in $required) {
            if (-not (Test-Path -LiteralPath $file)) {
              throw "Missing required file: $file"
            }
          }
          $html = Get-Content -Raw -LiteralPath "index.html"
          if ($html -notmatch "(?i)<!doctype html>" -or $html -notmatch "(?i)</html>") {
            throw "index.html failed the structure check"
          }
          $loopHtml = Get-Content -Raw -LiteralPath "loop-engineering.html"
          if ($loopHtml -notmatch "(?i)<!doctype html>" -or $loopHtml -notmatch "(?i)</html>") {
            throw "loop-engineering.html failed the structure check"
          }
          if ($loopHtml -notmatch "Loop Engineering" -or
              $loopHtml -notmatch "Budget calculator" -or
              $loopHtml -notmatch "Convergence engineering" -or
              $loopHtml -notmatch "Verifier architecture") {
            throw "loop-engineering.html is missing required content"
          }

  deploy:
    name: Deploy site
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
